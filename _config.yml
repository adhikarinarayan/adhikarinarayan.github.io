title: Narayan's Page
description: Personal portfolio and blog of Narayan, featuring projects, blog posts, and recommendations.
url: "https://yourusername.github.io"
baseurl: ""

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

# Collections
collections:
  projects:
    output: true

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
    values:
      layout: "default"
      
excerpt_separator: "\n\n"
