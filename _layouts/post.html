---
layout: default
---

<article class="blog-post">
  {% if page.redirect_url %}
    <script>
      window.location.href = "{{ page.redirect_url }}";
    </script>
     <h1>{{ page.title }}</h1>
  {% else %}
    <h1>{{ page.title }}</h1>
  {% endif %}
  <p class="post-meta">Categories: {{ page.categories | join: ", " }}</p>
  <p class="post-meta">Written on: {{ page.date | date: "%B %d, %Y" }}</p>
  <hr class="post-separator">
  <div class="post-content">{{ content }}</div>
</article>
